<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="ambre-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8927A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E07A5F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  
  <!-- Letter E - main strokes in white -->
  <!-- Vertical bar -->
  <rect x="128" y="112" width="48" height="288" rx="8" fill="#ffffff"/>
  <!-- Top horizontal -->
  <rect x="128" y="112" width="224" height="48" rx="8" fill="#ffffff"/>
  <!-- Middle horizontal -->
  <rect x="128" y="232" width="192" height="48" rx="8" fill="#ffffff"/>
  <!-- Bottom horizontal -->
  <rect x="128" y="352" width="224" height="48" rx="8" fill="#ffffff"/>
  
  <!-- AI accent - dot and slash in ambre -->
  <!-- The "AI" part: a stylized dot above and a diagonal slash -->
  <circle cx="400" cy="136" r="28" fill="url(#ambre-grad)"/>
  <rect x="384" y="192" width="32" height="208" rx="8" fill="url(#ambre-grad)"/>
</svg>